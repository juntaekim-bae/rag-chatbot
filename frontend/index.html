<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문서 챗봇</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1a202c;
      --text-muted: #718096;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --user-bubble: #4f46e5;
      --ai-bubble: #f7f8fc;
      --shadow: 0 1px 3px rgba(0,0,0,.1);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--primary);
    }

    .sidebar-header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* upload area */
    .upload-area {
      margin: 14px;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 18px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }

    .upload-area:hover, .upload-area.drag { border-color: var(--primary); background: #eef2ff; }

    .upload-area .icon { font-size: 28px; }
    .upload-area p { font-size: 13px; color: var(--text-muted); margin-top: 6px; }
    .upload-area span { font-size: 11px; color: var(--text-muted); }
    #file-input { display: none; }

    .upload-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 14px;
      background: var(--primary);
      color: #fff;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    /* progress */
    #upload-progress {
      margin: 0 14px 10px;
      display: none;
    }

    .progress-bar-wrap {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width .3s;
    }

    .progress-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* Google Drive 섹션 */
    .drive-section {
      margin: 0 14px 10px;
      border: 1px solid #c6f6d5;
      border-radius: var(--radius);
      background: #f0fff4;
      overflow: hidden;
    }

    .drive-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
    }

    .drive-header span { font-size: 13px; font-weight: 600; color: #276749; flex: 1; }
    .drive-header .arrow { font-size: 11px; color: #276749; transition: transform .2s; }
    .drive-header.open .arrow { transform: rotate(90deg); }

    .drive-body { padding: 0 12px 12px; display: none; }
    .drive-body.open { display: block; }

    .drive-body input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #9ae6b4;
      border-radius: 8px;
      font-size: 12px;
      outline: none;
      background: #fff;
      margin-bottom: 8px;
    }

    .drive-body input:focus { border-color: #38a169; }

    .drive-sync-btn {
      width: 100%;
      padding: 8px;
      background: #38a169;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    .drive-sync-btn:hover:not(:disabled) { background: #276749; }
    .drive-sync-btn:disabled { opacity: .5; cursor: not-allowed; }

    .drive-status {
      margin-top: 8px;
      font-size: 11px;
      color: #276749;
      min-height: 16px;
    }

    .drive-progress-wrap {
      height: 5px;
      background: #c6f6d5;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
      display: none;
    }

    .drive-progress-bar {
      height: 100%;
      background: #38a169;
      width: 0%;
      transition: width .4s;
    }

    /* doc list */
    .doc-section {
      flex: 1;
      overflow-y: auto;
      padding: 0 14px 14px;
    }

    .doc-section h2 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 8px;
    }

    .doc-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 6px;
      background: var(--bg);
    }

    .doc-icon { font-size: 18px; flex-shrink: 0; }

    .doc-info { flex: 1; min-width: 0; }
    .doc-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-chunks { font-size: 11px; color: var(--text-muted); }

    .doc-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color .2s, background .2s;
    }
    .doc-del:hover { color: #e53e3e; background: #fff5f5; }

    .empty-docs { font-size: 13px; color: var(--text-muted); text-align: center; padding: 20px 0; }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #48bb78;
    }

    .chat-header h2 { font-size: 16px; font-weight: 600; }
    .chat-header .stat { font-size: 12px; color: var(--text-muted); margin-left: auto; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .welcome .big { font-size: 40px; margin-bottom: 12px; }
    .welcome h3 { font-size: 18px; font-weight: 600; color: var(--text); }
    .welcome p { font-size: 14px; margin-top: 6px; }

    /* message bubbles */
    .msg { display: flex; gap: 10px; max-width: 820px; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.ai { align-self: flex-start; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .msg.user .avatar { background: var(--primary); }
    .msg.ai .avatar { background: #e9d8fd; }

    .bubble-wrap { display: flex; flex-direction: column; gap: 4px; max-width: calc(100% - 44px); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }
    .msg.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    /* sources */
    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .source-tag {
      font-size: 11px;
      background: #ebf4ff;
      color: #2b6cb0;
      border: 1px solid #bee3f8;
      border-radius: 20px;
      padding: 2px 10px;
    }

    /* cached badge */
    .cached-badge {
      display: inline-block;
      font-size: 10px;
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
      border-radius: 20px;
      padding: 1px 8px;
      margin-bottom: 4px;
    }


    /* image preview in bubble */
    .img-preview {
      max-width: 200px;
      max-height: 150px;
      border-radius: 8px;
      margin-bottom: 6px;
      display: block;
    }

    /* image upload btn */
    .img-btn {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #f0f4ff;
      border: 1px solid var(--border);
      color: var(--primary);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .2s;
    }
    .img-btn:hover { background: #e0e7ff; }
    #img-input { display: none; }

    /* typing cursor */
    .cursor::after {
      content: '▋';
      animation: blink .7s infinite;
      opacity: 1;
    }

    @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0 } }

    /* input bar */
    .input-bar {
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-bar textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      max-height: 120px;
      min-height: 44px;
      line-height: 1.5;
      transition: border-color .2s;
    }

    .input-bar textarea:focus { border-color: var(--primary); }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--primary);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: background .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) { background: var(--primary-hover); }
    .send-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* toast */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      color: #fff;
      background: #2d3748;
      box-shadow: var(--shadow);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      z-index: 100;
    }

    #toast.show { opacity: 1; }
    #toast.error { background: #c53030; }
    #toast.success { background: #276749; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── 비밀번호 화면 ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #login-screen.hidden { display: none; }

    .login-box {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      text-align: center;
    }

    .login-box .logo { font-size: 48px; margin-bottom: 12px; }
    .login-box h2 { font-size: 20px; font-weight: 700; color: #1a202c; }
    .login-box p { font-size: 13px; color: #718096; margin: 6px 0 24px; }

    .login-box input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      text-align: center;
      letter-spacing: 3px;
      transition: border-color .2s;
    }

    .login-box input:focus { border-color: #667eea; }

    .login-btn {
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }

    .login-btn:hover { opacity: .9; }
    .login-error { color: #e53e3e; font-size: 13px; margin-top: 10px; min-height: 18px; }

    /* 관리자 패널 */
    #admin-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9998;
    }
    #admin-screen.hidden { display: none; }

    .admin-box {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }

    .admin-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .admin-box p { font-size: 13px; color: #718096; margin-bottom: 20px; }

    .admin-box input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      margin-bottom: 10px;
      transition: border-color .2s;
    }
    .admin-box input:focus { border-color: #667eea; }

    .admin-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .admin-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }

    .admin-btn.primary { background: #667eea; color: #fff; }
    .admin-btn.danger { background: #e53e3e; color: #fff; }
    .admin-btn.secondary { background: #e2e8f0; color: #4a5568; }
    .admin-btn:hover { opacity: .85; }
    .admin-msg { font-size: 13px; margin-top: 10px; min-height: 18px; color: #276749; }
  </style>
</head>
<body>

<!-- 비밀번호 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">🔐</div>
    <h2>문서 챗봇</h2>
    <p>접속하려면 비밀번호를 입력하세요</p>
    <input type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="off" />
    <button class="login-btn" onclick="doLogin()">입장</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- 관리자 패널 -->
<div id="admin-screen" class="hidden">
  <div class="admin-box">
    <h2>⚙️ 관리자 설정</h2>
    <p>서비스를 잠그거나 접속 비밀번호를 변경할 수 있습니다.</p>
    <input type="password" id="admin-new-pw" placeholder="새 접속 비밀번호 입력" />
    <div class="admin-actions">
      <button class="admin-btn primary" onclick="changePassword()">비밀번호 변경</button>
      <button class="admin-btn danger" onclick="lockService()">서비스 잠금</button>
      <button class="admin-btn secondary" onclick="closeAdmin()">취소</button>
    </div>
    <div class="admin-msg" id="admin-msg"></div>
  </div>
</div>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>📚 문서 챗봇</h1>
    <p>문서를 업로드하고 질문해보세요</p>
  </div>

  <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">📄</div>
    <p>파일을 드래그하거나</p>
    <div class="upload-btn">파일 선택</div>
    <span>PDF, DOCX, TXT, MD 지원</span>
    <input type="file" id="file-input" accept=".pdf,.docx,.doc,.txt,.md,.markdown" multiple />
  </div>

  <div id="upload-progress">
    <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar"></div></div>
    <div class="progress-label" id="prog-label"></div>
  </div>

  <!-- Google Drive 동기화 -->
  <div class="drive-section">
    <div class="drive-header" id="drive-toggle" onclick="toggleDrive()">
      <span>🔗 Google Drive 연동</span>
      <span class="arrow">▶</span>
    </div>
    <div class="drive-body" id="drive-body">
      <input type="text" id="drive-url" placeholder="Google Drive 링크를 붙여넣으세요" />
      <button class="drive-sync-btn" id="drive-btn" onclick="syncDrive()">동기화 시작</button>
      <div class="drive-progress-wrap" id="drive-prog-wrap">
        <div class="drive-progress-bar" id="drive-prog-bar"></div>
      </div>
      <div class="drive-status" id="drive-status"></div>
    </div>
  </div>

  <div class="doc-section">
    <h2>인덱싱된 문서</h2>
    <div id="doc-list"><div class="empty-docs">문서 없음</div></div>
  </div>
</aside>

<!-- Chat -->
<main class="chat-area">
  <div class="chat-header">
    <div class="dot" id="status-dot"></div>
    <h2>AI 어시스턴트</h2>
    <span class="stat" id="chunk-stat"></span>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="big">🤖</div>
      <h3>문서 기반 AI 챗봇</h3>
      <p>왼쪽에서 문서를 업로드한 뒤 질문해보세요.</p>
    </div>
  </div>

  <div class="input-bar">
    <button class="img-btn" onclick="document.getElementById('img-input').click()" title="이미지로 질문">🖼️</button>
    <input type="file" id="img-input" accept="image/*" />
    <textarea id="question" placeholder="질문을 입력하세요… (이미지 버튼으로 캡처 업로드 가능, Enter: 전송)" rows="1"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendChat()" title="전송">➤</button>
  </div>
</main>

<div id="toast"></div>

<script>
  const API = '';
  let isStreaming = false;
  let _adminPassword = '';

  // ── 로그인 ──
  async function doLogin() {
    const pw = document.getElementById('login-pw').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.detail || '비밀번호가 틀렸습니다.'; return; }

      if (data.role === 'admin') {
        _adminPassword = pw;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-screen').classList.remove('hidden');
      } else {
        document.getElementById('login-screen').classList.add('hidden');
      }
    } catch { errEl.textContent = '서버 오류. 잠시 후 다시 시도하세요.'; }
  }

  document.getElementById('login-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // ── 관리자 패널 ──
  async function changePassword() {
    const newPw = document.getElementById('admin-new-pw').value.trim();
    if (!newPw) { document.getElementById('admin-msg').textContent = '새 비밀번호를 입력하세요.'; return; }
    const res = await fetch(`${API}/api/auth/admin`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_password: _adminPassword, new_password: newPw }),
    });
    const data = await res.json();
    document.getElementById('admin-msg').textContent = data.message || data.detail;
    if (res.ok) setTimeout(closeAdmin, 1500);
  }

  async function lockService() {
    if (!confirm('서비스를 잠그면 아무도 접속할 수 없습니다. 계속할까요?')) return;
    const res = await fetch(`${API}/api/auth/admin`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_password: _adminPassword, new_password: 'LOCK' }),
    });
    const data = await res.json();
    document.getElementById('admin-msg').textContent = data.message || data.detail;
    if (res.ok) setTimeout(() => { closeAdmin(); location.reload(); }, 1500);
  }

  function closeAdmin() {
    document.getElementById('admin-screen').classList.add('hidden');
    document.getElementById('admin-new-pw').value = '';
    document.getElementById('admin-msg').textContent = '';
  }

  // 서비스 잠금 여부 확인
  fetch(`${API}/api/auth/status`).then(r => r.json()).then(d => {
    if (d.locked) {
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('login-error').textContent = '서비스가 잠겨 있습니다.';
    }
  }).catch(() => {});

  // ── Toast ──
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    setTimeout(() => el.className = '', 3000);
  }

  // ── Docs ──
  async function loadDocs() {
    try {
      const res = await fetch(`${API}/api/documents`);
      const data = await res.json();
      renderDocs(data.documents);
      const chunks = data.total_chunks;
      document.getElementById('chunk-stat').textContent = `${data.documents.length}개 문서 · ${chunks}개 청크`;
    } catch { /* ignore */ }
  }

  function fileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    return { pdf: '📕', docx: '📘', doc: '📘', txt: '📄', md: '📝', markdown: '📝' }[ext] || '📄';
  }

  function renderDocs(docs) {
    const el = document.getElementById('doc-list');
    if (!docs.length) { el.innerHTML = '<div class="empty-docs">문서 없음</div>'; return; }
    el.innerHTML = docs.map(d => `
      <div class="doc-item" id="doc-${CSS.escape(d.filename)}">
        <div class="doc-icon">${fileIcon(d.filename)}</div>
        <div class="doc-info">
          <div class="doc-name" title="${d.filename}">${d.filename}</div>
          <div class="doc-chunks">${d.chunks}개 청크</div>
        </div>
        <button class="doc-del" onclick="deleteDoc('${d.filename.replace(/'/g, "\\'")}')" title="삭제">✕</button>
      </div>`).join('');
  }

  async function deleteDoc(filename) {
    if (!confirm(`"${filename}"을 삭제하시겠습니까?`)) return;
    try {
      await fetch(`${API}/api/documents/${encodeURIComponent(filename)}`, { method: 'DELETE' });
      toast(`${filename} 삭제됨`, 'success');
      loadDocs();
    } catch { toast('삭제 실패', 'error'); }
  }

  // ── Upload ──
  async function uploadFiles(files) {
    const prog = document.getElementById('upload-progress');
    const bar = document.getElementById('prog-bar');
    const label = document.getElementById('prog-label');

    const fileArr = Array.from(files);
    prog.style.display = 'block';

    for (let i = 0; i < fileArr.length; i++) {
      const file = fileArr[i];
      label.textContent = `업로드 중: ${file.name} (${i + 1}/${fileArr.length})`;
      bar.style.width = `${((i) / fileArr.length) * 100}%`;

      const fd = new FormData();
      fd.append('file', file);
      try {
        const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '업로드 실패');
        toast(`${file.name}: ${data.chunks}개 청크 인덱싱`, 'success');
      } catch (e) {
        toast(`${file.name}: ${e.message}`, 'error');
      }
    }

    bar.style.width = '100%';
    label.textContent = '완료!';
    setTimeout(() => { prog.style.display = 'none'; bar.style.width = '0'; }, 1500);
    loadDocs();
  }

  document.getElementById('file-input').addEventListener('change', e => { if (e.target.files.length) uploadFiles(e.target.files); });

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag');
    if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
  });

  // ── Chat ──
  function addMessage(role, text = '') {
    document.getElementById('welcome')?.remove();
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bwrap = document.createElement('div');
    bwrap.className = 'bubble-wrap';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    bwrap.appendChild(bubble);
    wrap.appendChild(avatar);
    wrap.appendChild(bwrap);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return { bubble, bwrap };
  }

  function addSources(bwrap, sources) {
    if (!sources.length) return;
    const div = document.createElement('div');
    div.className = 'sources';
    sources.forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'source-tag';
      tag.textContent = '📎 ' + s;
      div.appendChild(tag);
    });
    bwrap.appendChild(div);
  }

  async function streamResponse(fetchPromise, displayQuestion) {
    isStreaming = true;
    document.getElementById('send-btn').disabled = true;

    addMessage('user', displayQuestion);
    const { bubble, bwrap } = addMessage('ai');
    bubble.classList.add('cursor');

    let aiText = '';
    let sources = [];
    const subBlocks = {};  // index → {header, body} DOM
    const msgs = document.getElementById('messages');

    function scroll() { msgs.scrollTop = msgs.scrollHeight; }

    try {
      const res = await fetchPromise;
      if (!res.ok) throw new Error(`서버 오류: ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') break;
          try {
            const ev = JSON.parse(raw);

            if (ev.type === 'cached') {
              const badge = document.createElement('div');
              badge.className = 'cached-badge';
              badge.textContent = '⚡ 캐시된 답변';
              bwrap.insertBefore(badge, bubble);

            } else if (ev.type === 'sources') {
              sources = ev.sources;

            } else if (ev.type === 'text') {
              aiText += ev.content;
              bubble.textContent = aiText;
              scroll();

            } else if (ev.type === 'error') {
              bubble.textContent = ev.content;
            }
          } catch { /* skip */ }
        }
      }
    } catch (e) {
      bubble.textContent = `오류가 발생했습니다: ${e.message}`;
    } finally {
      bubble.classList.remove('cursor');
      if (sources.length) addSources(bwrap, sources);
      isStreaming = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('question').focus();
    }
  }

  async function sendChat() {
    if (isStreaming) return;
    const input = document.getElementById('question');
    const question = input.value.trim();
    if (!question) return;
    input.value = '';
    input.style.height = 'auto';

    await streamResponse(
      fetch(`${API}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      }),
      question
    );
  }

  // 이미지로 질문
  document.getElementById('img-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file || isStreaming) return;
    e.target.value = '';

    const extra = document.getElementById('question').value.trim();
    document.getElementById('question').value = '';
    document.getElementById('question').style.height = 'auto';

    // 이미지 미리보기 메시지
    const objectUrl = URL.createObjectURL(file);
    const displayText = extra ? `[이미지] ${extra}` : '[이미지로 질문]';

    isStreaming = true;
    document.getElementById('send-btn').disabled = true;
    document.getElementById('welcome')?.remove();
    const msgs = document.getElementById('messages');

    // 사용자 메시지 (이미지 + 텍스트)
    const userWrap = document.createElement('div');
    userWrap.className = 'msg user';
    userWrap.innerHTML = `
      <div class="avatar">👤</div>
      <div class="bubble-wrap">
        <img src="${objectUrl}" class="img-preview" />
        ${extra ? `<div class="bubble">${extra}</div>` : ''}
      </div>`;
    msgs.appendChild(userWrap);
    msgs.scrollTop = msgs.scrollHeight;
    isStreaming = false;

    const fd = new FormData();
    fd.append('file', file);
    if (extra) fd.append('extra', extra);

    await streamResponse(
      fetch(`${API}/api/chat/image`, { method: 'POST', body: fd }),
      displayText
    );
  });

  // Enter to send
  document.getElementById('question').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });

  // Auto-resize textarea
  document.getElementById('question').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // ── Google Drive ──
  function toggleDrive() {
    const header = document.getElementById('drive-toggle');
    const body = document.getElementById('drive-body');
    header.classList.toggle('open');
    body.classList.toggle('open');
  }

  let drivePolling = null;

  async function syncDrive() {
    const url = document.getElementById('drive-url').value.trim();
    if (!url) { toast('Google Drive 링크를 입력하세요', 'error'); return; }
    if (!url.includes('drive.google.com')) {
      toast('올바른 Google Drive 링크가 아닙니다', 'error'); return;
    }

    const btn = document.getElementById('drive-btn');
    btn.disabled = true;
    setDriveStatus('동기화 시작 중...', 0, 0);

    try {
      const res = await fetch(`${API}/api/drive/sync`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '동기화 요청 실패');

      // 진행 상황 폴링
      drivePolling = setInterval(pollDriveStatus, 1500);
    } catch (e) {
      toast(e.message, 'error');
      btn.disabled = false;
    }
  }

  async function pollDriveStatus() {
    try {
      const res = await fetch(`${API}/api/drive/status`);
      const s = await res.json();

      const pct = s.total > 0 ? Math.round((s.progress / s.total) * 100) : (s.running ? 30 : 0);
      setDriveStatus(s.message, pct, s.total);

      if (s.done) {
        clearInterval(drivePolling);
        drivePolling = null;
        document.getElementById('drive-btn').disabled = false;
        loadDocs();
        if (s.errors.length) toast(`완료 (${s.errors.length}개 오류)`, '');
        else toast('Google Drive 동기화 완료!', 'success');
      }
    } catch { /* ignore */ }
  }

  function setDriveStatus(msg, pct, total) {
    document.getElementById('drive-status').textContent = msg;
    const wrap = document.getElementById('drive-prog-wrap');
    const bar = document.getElementById('drive-prog-bar');
    if (pct > 0 || total > 0) {
      wrap.style.display = 'block';
      bar.style.width = pct + '%';
    } else {
      wrap.style.display = 'none';
    }
  }

  // Init
  loadDocs();
  setInterval(loadDocs, 30000);
</script>
</body>
</html>
