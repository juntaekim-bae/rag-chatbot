<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 문서 챗봇</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6f9; --surface: #ffffff; --border: #e2e8f0;
      --text: #1a202c; --text-muted: #718096;
      --primary: #4f46e5; --primary-hover: #4338ca;
      --user-bubble: #4f46e5; --ai-bubble: #f7f8fc;
      --shadow: 0 1px 3px rgba(0,0,0,.1); --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

    /* ── 로그인 화면 ── */
    #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    #login-screen.hidden { display: none; }
    .login-box { background: #fff; border-radius: 20px; padding: 40px 36px; width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,.3); text-align: center; }
    .login-box .logo { font-size: 48px; margin-bottom: 12px; }
    .login-box h2 { font-size: 20px; font-weight: 700; color: #1a202c; }
    .login-box p { font-size: 13px; color: #718096; margin: 6px 0 24px; }
    .login-box input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; outline: none; text-align: center; letter-spacing: 3px; transition: border-color .2s; }
    .login-box input:focus { border-color: #667eea; }
    .login-btn { width: 100%; margin-top: 14px; padding: 13px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .login-btn:hover { opacity: .9; }
    .login-error { color: #e53e3e; font-size: 13px; margin-top: 10px; min-height: 18px; }

    /* ── 채팅 ── */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .chat-header .dot { width: 10px; height: 10px; border-radius: 50%; background: #48bb78; }
    .chat-header h2 { font-size: 16px; font-weight: 600; }
    .chat-header .stat { font-size: 12px; color: var(--text-muted); margin-left: auto; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .welcome { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .welcome .big { font-size: 40px; margin-bottom: 12px; }
    .welcome h3 { font-size: 18px; font-weight: 600; color: var(--text); }
    .welcome p { font-size: 14px; margin-top: 6px; }
    .msg { display: flex; gap: 10px; max-width: 820px; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.ai { align-self: flex-start; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .msg.user .avatar { background: var(--primary); }
    .msg.ai .avatar { background: #e9d8fd; }
    .bubble-wrap { display: flex; flex-direction: column; gap: 4px; max-width: calc(100% - 44px); }
    .bubble { padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg.user .bubble { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }
    .msg.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .sources { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .source-tag { font-size: 11px; background: #ebf4ff; color: #2b6cb0; border: 1px solid #bee3f8; border-radius: 20px; padding: 2px 10px; }
    .cached-badge { display: inline-block; font-size: 10px; background: #fef3c7; color: #92400e; border: 1px solid #fde68a; border-radius: 20px; padding: 1px 8px; margin-bottom: 4px; }
    .decomposed { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; background: #f0f4ff; border-radius: 6px; padding: 6px 10px; }
    .decomposed span { font-weight: 600; color: var(--primary); }
    .sub-block { background: #f8faff; border: 1px solid #e0e7ff; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
    .sub-header { display: flex; align-items: center; gap: 6px; padding: 7px 12px; background: #eef2ff; font-size: 12px; font-weight: 600; color: var(--primary); }
    .sub-header .sub-num { background: var(--primary); color: #fff; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
    .sub-body { padding: 8px 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; color: var(--text); }
    .final-divider { display: flex; align-items: center; gap: 8px; margin: 10px 0 6px; font-size: 12px; font-weight: 600; color: var(--primary); }
    .final-divider::before, .final-divider::after { content: ''; flex: 1; height: 1px; background: #e0e7ff; }
    .img-preview { max-width: 200px; max-height: 150px; border-radius: 8px; margin-bottom: 6px; display: block; }
    .cursor::after { content: '▋'; animation: blink .7s infinite; }
    @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0 } }
    .input-bar { padding: 14px 20px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
    .input-bar textarea { flex: 1; resize: none; border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none; max-height: 120px; min-height: 44px; line-height: 1.5; transition: border-color .2s; }
    .input-bar textarea:focus { border-color: var(--primary); }
    .img-btn { width: 44px; height: 44px; border-radius: 10px; background: #f0f4ff; border: 1px solid var(--border); color: var(--primary); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .img-btn:hover { background: #e0e7ff; }
    #img-input { display: none; }
    .send-btn { width: 44px; height: 44px; border-radius: 10px; background: var(--primary); border: none; color: #fff; font-size: 18px; cursor: pointer; transition: background .2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:hover:not(:disabled) { background: var(--primary-hover); }
    .send-btn:disabled { opacity: .5; cursor: not-allowed; }
    #toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; border-radius: 8px; font-size: 13px; color: #fff; background: #2d3748; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100; }
    #toast.show { opacity: 1; }
    #toast.error { background: #c53030; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">🤖</div>
    <h2>AI 문서 챗봇</h2>
    <p>서비스를 이용하려면 비밀번호를 입력하세요</p>
    <input type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="off" />
    <button class="login-btn" onclick="doLogin()">입장</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- 채팅 화면 -->
<main class="chat-area">
  <div class="chat-header">
    <div class="dot"></div>
    <h2>AI 어시스턴트</h2>
    <span class="stat" id="chunk-stat"></span>
  </div>
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="big">🤖</div>
      <h3>문서 기반 AI 챗봇</h3>
      <p>궁금한 내용을 질문해보세요.</p>
    </div>
  </div>
  <div class="input-bar">
    <button class="img-btn" onclick="document.getElementById('img-input').click()" title="이미지로 질문">🖼️</button>
    <input type="file" id="img-input" accept="image/*" />
    <textarea id="question" placeholder="질문을 입력하세요… (Enter: 전송, Shift+Enter: 줄바꿈)" rows="1"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendChat()">➤</button>
  </div>
</main>

<div id="toast"></div>

<script>
  const API = '';
  let isStreaming = false;
  let _token = sessionStorage.getItem('chat_token') || '';
  let _heartbeatTimer = null;

  function showLogin(msg = '') {
    _token = '';
    sessionStorage.removeItem('chat_token');
    if (_heartbeatTimer) { clearInterval(_heartbeatTimer); _heartbeatTimer = null; }
    document.getElementById('login-screen').classList.remove('hidden');
    if (msg) document.getElementById('login-error').textContent = msg;
  }

  function startHeartbeat() {
    if (_heartbeatTimer) clearInterval(_heartbeatTimer);
    _heartbeatTimer = setInterval(async () => {
      try {
        const r = await fetch(`${API}/api/auth/heartbeat`, {
          method: 'POST', headers: { 'Authorization': `Bearer ${_token}` }
        });
        if (r.status === 401) showLogin('비밀번호가 변경되어 다시 로그인이 필요합니다.');
      } catch {}
    }, 30000);
  }

  // ── 로그인 ──
  async function doLogin() {
    const pw = document.getElementById('login-pw').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.detail || '비밀번호가 틀렸습니다.'; return; }
      if (data.role === 'admin') { errEl.textContent = '관리자는 /admin 페이지를 이용하세요.'; return; }
      _token = data.token || '';
      sessionStorage.setItem('chat_token', _token);
      document.getElementById('login-screen').classList.add('hidden');
      loadStat();
      startHeartbeat();
    } catch { errEl.textContent = '서버 오류. 잠시 후 다시 시도하세요.'; }
  }
  document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // 잠금 상태 확인 / 기존 토큰 자동 복구
  (async () => {
    try {
      const d = await (await fetch(`${API}/api/auth/status`)).json();
      if (d.locked) { document.getElementById('login-error').textContent = '서비스가 잠겨 있습니다. 관리자에게 문의하세요.'; return; }
    } catch {}
    // 저장된 토큰이 있으면 하트비트로 유효성 확인
    if (_token) {
      try {
        const r = await fetch(`${API}/api/auth/heartbeat`, { method: 'POST', headers: { 'Authorization': `Bearer ${_token}` } });
        if (r.ok) {
          document.getElementById('login-screen').classList.add('hidden');
          loadStat(); startHeartbeat(); return;
        }
      } catch {}
      _token = ''; sessionStorage.removeItem('chat_token');
    }
  })();

  async function loadStat() {
    try {
      const res = await fetch(`${API}/api/documents`);
      const data = await res.json();
      document.getElementById('chunk-stat').textContent = `${data.documents.length}개 문서 · ${data.total_chunks}개 청크`;
    } catch {}
  }

  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = `show ${type}`;
    setTimeout(() => el.className = '', 3000);
  }

  function addMessage(role, text = '') {
    document.getElementById('welcome')?.remove();
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';
    const bwrap = document.createElement('div');
    bwrap.className = 'bubble-wrap';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    bwrap.appendChild(bubble);
    wrap.appendChild(avatar);
    wrap.appendChild(bwrap);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return { bubble, bwrap };
  }

  function addSources(bwrap, sources) {
    if (!sources.length) return;
    const div = document.createElement('div');
    div.className = 'sources';
    sources.forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'source-tag';
      tag.textContent = '📎 ' + s;
      div.appendChild(tag);
    });
    bwrap.appendChild(div);
  }

  async function streamResponse(fetchPromise, displayQuestion) {
    isStreaming = true;
    document.getElementById('send-btn').disabled = true;
    addMessage('user', displayQuestion);
    const { bubble, bwrap } = addMessage('ai');
    bubble.classList.add('cursor');
    let aiText = '', sources = [];
    const subBlocks = {};
    const msgs = document.getElementById('messages');
    const scroll = () => { msgs.scrollTop = msgs.scrollHeight; };

    try {
      const res = await fetchPromise;
      if (!res.ok) throw new Error(`서버 오류: ${res.status}`);
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') break;
          try {
            const ev = JSON.parse(raw);
            if (ev.type === 'cached') {
              const b = document.createElement('div'); b.className = 'cached-badge'; b.textContent = '⚡ 캐시된 답변';
              bwrap.insertBefore(b, bubble);
            } else if (ev.type === 'decomposed') {
              const d = document.createElement('div'); d.className = 'decomposed';
              d.innerHTML = `<span>🔍 질문 분해 (${ev.questions.length}개)</span><br>${ev.questions.map((q,i)=>`${i+1}. ${q}`).join('<br>')}`;
              bwrap.insertBefore(d, bubble);
            } else if (ev.type === 'sub_start') {
              const block = document.createElement('div'); block.className = 'sub-block';
              const header = document.createElement('div'); header.className = 'sub-header';
              header.innerHTML = `<span class="sub-num">${ev.index+1}</span>${ev.question}`;
              const body = document.createElement('div'); body.className = 'sub-body'; body.classList.add('cursor');
              block.appendChild(header); block.appendChild(body);
              bwrap.insertBefore(block, bubble);
              subBlocks[ev.index] = { body }; scroll();
            } else if (ev.type === 'sub_text') {
              if (subBlocks[ev.index]) { subBlocks[ev.index].body.textContent += ev.content; scroll(); }
            } else if (ev.type === 'sub_end') {
              if (subBlocks[ev.index]) subBlocks[ev.index].body.classList.remove('cursor');
            } else if (ev.type === 'final_start') {
              const d = document.createElement('div'); d.className = 'final-divider'; d.textContent = '✨ 최종 통합 답변';
              bwrap.insertBefore(d, bubble); scroll();
            } else if (ev.type === 'sources') { sources = ev.sources;
            } else if (ev.type === 'text') { aiText += ev.content; bubble.textContent = aiText; scroll();
            } else if (ev.type === 'error') { bubble.textContent = ev.content; }
          } catch {}
        }
      }
    } catch (e) { bubble.textContent = `오류: ${e.message}`; }
    finally {
      bubble.classList.remove('cursor');
      if (sources.length) addSources(bwrap, sources);
      isStreaming = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('question').focus();
    }
  }

  async function sendChat() {
    if (isStreaming) return;
    const input = document.getElementById('question');
    const question = input.value.trim();
    if (!question) return;
    input.value = ''; input.style.height = 'auto';
    await streamResponse(fetch(`${API}/api/chat`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    }), question);
  }

  document.getElementById('img-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file || isStreaming) return;
    e.target.value = '';
    const extra = document.getElementById('question').value.trim();
    document.getElementById('question').value = '';
    document.getElementById('question').style.height = 'auto';
    const objectUrl = URL.createObjectURL(file);
    isStreaming = true;
    document.getElementById('send-btn').disabled = true;
    document.getElementById('welcome')?.remove();
    const msgs = document.getElementById('messages');
    const userWrap = document.createElement('div');
    userWrap.className = 'msg user';
    userWrap.innerHTML = `<div class="avatar">👤</div><div class="bubble-wrap"><img src="${objectUrl}" class="img-preview" />${extra ? `<div class="bubble">${extra}</div>` : ''}</div>`;
    msgs.appendChild(userWrap);
    msgs.scrollTop = msgs.scrollHeight;
    isStreaming = false;
    const fd = new FormData();
    fd.append('file', file);
    if (extra) fd.append('extra', extra);
    await streamResponse(fetch(`${API}/api/chat/image`, { method: 'POST', body: fd }), extra ? `[이미지] ${extra}` : '[이미지로 질문]');
  });

  document.getElementById('question').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } });
  document.getElementById('question').addEventListener('input', function () { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px'; });
</script>
</body>
</html>
